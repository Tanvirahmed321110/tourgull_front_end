<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Mobile Input with Country Code</title>
        <style>
            * {
                box-sizing: border-box;
            }

            body {
                font-family: sans-serif;
                padding: 20px;
                background: #f9f9f9;
            }

            .phone-input-group {
                display: flex;
                max-width: 400px;
                margin: auto;
                border: 1px solid #ccc;
                border-radius: 8px;
                overflow: hidden;
                background: #fff;
            }

            .phone-input-group select {
                padding: 10px;
                border: none;
                background: #f0f0f0;
                font-size: 1rem;
                outline: none;
                width: 120px;
            }

            .phone-input-group input {
                flex: 1;
                padding: 10px;
                font-size: 1rem;
                border: none;
                outline: none;
            }

            .phone-input-group:focus-within {
                border-color: #25b09b;
                box-shadow: 0 0 0 2px rgba(37, 176, 155, 0.2);
            }
        </style>
    </head>

    <body>

        <h2>Mobile Number Input</h2>

        <div class="phone-input-group">
            <select id="country-code">
                <option value="+880">🇧🇩 +880</option>
                <option value="+91">🇮🇳 +91</option>
                <option value="+1">🇺🇸 +1</option>
                <option value="+44">🇬🇧 +44</option>
                <option value="+61">🇦🇺 +61</option>
            </select>
            <input type="tel" id="mobile" placeholder="Enter mobile number" />
        </div>

    </body>

</html>
