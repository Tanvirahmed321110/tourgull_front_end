<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Validation</title>

        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                font-family: sans-serif;
            }

            .container {
                width: 100%;
                max-width: 1200px;
                margin: 0 auto;
                padding: 20px;
            }

            .form-control {
                width: 100%;
                padding: 10px;
                margin: 6px 0;
                box-sizing: border-box;
                position: relative;
            }

            .form-control input {
                width: 100%;
                padding: 10px;
                border: 1px solid #e6e0e0;
                border-radius: 4px;
            }

            .form-control label {
                color: #777;
                display: block;
                margin-bottom: 4px;
                cursor: pointer;
            }

            .form-control input::placeholder {
                color: #c2a5a5
            }

            .form-control input:focus {
                border-color: #777;
                outline: none;
            }

            .form-control.success input {
                border-color: #777;
            }

            .form-control.error input {
                border-color: red;
            }

            .form-control small {
                color: red;
                position: absolute;
                bottom: -6px;
                left: 12px;
                font-size: 12px;
                visibility: hidden;
            }

            .form-control.error small {
                visibility: visible;
            }

            .form {
                max-width: 400px;
                margin: 0 auto;
                padding: 20px;
                box-shadow: 0px 2px 10px rgba(0, 0, 0, 0.3);
                border-radius: 12px;
            }

            .form button {
                padding: 12px 20px;
                border-radius: 4px;
                background-color: #444;
                outline: none;
                border: none;
                width: 100%;
                color: rgb(255, 255, 255);
                cursor: pointer;
                font-size: 16px;
            }

            h3 {
                text-align: center;
            }

            .form .submited-message {
                display: none;
            }

            .form .submited-message.active {
                display: block;
            }
        </style>
    </head>

    <body>
        <div class="container">
            <form action="#" class="form" id="form">
                <h3>Register</h3>
                <div class="form-control">
                    <label for="name">Name</label>

                    <small>Error Message</small>
                </div>

                <div class="form-control">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email">
                    <small>Error Message</small>
                </div>

                    <small>Error Message</small>
                </div>

                    <small>Error Message</small>
                </div>

                        placeholder="Enter password again">

                <div class="form-control">

                </div>

                <!-- submited message -->

            </form>

            function isValidEmail(email) {
                const re = /\S+@\S+\.\S+/;

                small_tag.innerText = message

                if (input.value.length < min) {

                else if (input.value.length > max) {
                    show_error_message(input, `${input.id} min length ${max}`)

                else {

                }
